# CFG Scale Predictor Training Configuration

# Model Configuration
model:
  vocab_size: 4096
  d_model: 256
  nhead: 8
  num_layers: 4
  dim_feedforward: 1024
  dropout: 0.1
  max_seq_len: 1024
  cfg_scale_min: 0.0
  cfg_scale_max: 4.0

# Training Configuration
training:
  batch_size: 8
  num_epochs: 100
  learning_rate: 1e-4
  weight_decay: 1e-4
  warmup_steps: 4000
  gradient_clip_norm: 1.0
  
# Logging and Evaluation
logging:
  log_interval: 100
  eval_interval: 1000
  save_interval: 5000

# Data Configuration  
data:
  max_seq_len: 1024
  num_workers: 4
  pin_memory: true

# Distributed Training
distributed:
  backend: nccl
  find_unused_parameters: false
